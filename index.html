<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Tic Tac Toe</title>
        <link rel="stylesheet" href="css/magic-cards.css">
        <link rel="stylesheet" href="css/text-stroke.css">
    </head>
    <body>
        <div class="text-stroke" data-p-content="Tic Tac Toe Game">
            <p>Tic Tac Toe Game</p>
        </div>
        <div class="cards-container">
            <button class="card">
                <p>1</p>
            </button>
            <button class="card">
                <p>2</p>
            </button>
            <button class="card">
                <p>3</p>
            </button>
            <button class="card">
                <p>4</p>
            </button>
            <button class="card">
                <p>5</p>
            </button>
            <button class="card">
                <p>6</p>
            </button>
            <button class="card">
                <p>7</p>
            </button>
            <button class="card">
                <p>8</p>
            </button>
            <button class="card">
                <p>9</p>
            </button>
        </div>
        <script src="script.js"></script>
    </body>
</html>
